<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#1e1e1e;
    }

    .calculator{
        background:#2b2b2b;
        padding:20px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
        width:320px;
    }

    #display{
        width:100%;
        height:70px;
        border:none;
        outline:none;
        background:#111;
        color:#fff;
        font-size:2rem;
        text-align:right;
        padding:15px;
        border-radius:10px;
        margin-bottom:15px;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        gap:10px;
    }

    button{
        height:60px;
        border:none;
        border-radius:10px;
        font-size:1.3rem;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .number{
        background:#444;
        color:white;
    }

    .operator{
        background:#ff9500;
        color:white;
    }

    .clear{
        background:#e53935;
        color:white;
    }

    .equal{
        background:#28a745;
        color:white;
        grid-column:span 2;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('%')">%</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="number" onclick="appendValue('.')">.</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendValue(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = '';
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        } catch(error){
            display.value = 'Error';
        }
    }

    document.addEventListener('keydown', (e) => {
        const allowed = '0123456789+-*/.%';
        
        if (allowed.includes(e.key)) {
            appendValue(e.key);
        } else if (e.key === 'Enter') {
            calculate();
        } else if (e.key === 'Backspace') {
            display.value = display.value.slice(0, -1);
        } else if (e.key === 'Escape') {
            clearDisplay();
        }
    });
</script>

</body>
</html>
